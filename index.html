<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="theme-color" content="#000000">
    <title>MOST29 - Canlı Yayın Paneli</title>
    
    <!-- Font Awesome ve Orijinal Stiller -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0f172a; color: #ffffff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: #e94560; margin-bottom: 20px; font-size: 24px; font-weight: bold; }
        
        /* Orijinal Oyuncu Tasarımı */
        #player-container { display: none; margin-bottom: 25px; background: #000; padding: 10px; border-radius: 8px; border: 2px solid #e94560; box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3); }
        #player-container iframe { width: 100%; aspect-ratio: 16/9; border: 0; }
        .close-player { background: #dc2626; color: white; border: 0; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 8px; float: right; transition: 0.2s; }
        .close-player:hover { background: #b91c1c; }

        /* Kategori Filtre Butonları */
        .topcategory-filter { margin: 20px 0; padding: 10px; background: #1e293b; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 8px; border: 1px solid #334155; }
        .topcategory-btn { padding: 10px 14px; background: #2563eb; border: 1px solid #1d4ed8; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.3s ease; color: #ffffff; }
        .topcategory-btn:hover { background: #1d4ed8; transform: translateY(-2px); }
        .topcategory-btn.active { background: #e94560; border-color: #e94560; box-shadow: 0 0 10px rgba(233, 69, 96, 0.5); }

        /* Arama Çubuğu */
        .search-bar { margin: 20px 0; }
        .search-bar input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #fff; font-size: 16px; transition: 0.2s; }
        .search-bar input:focus { border-color: #e94560; outline: none; }

        /* Bölüm Başlıkları ve Maç Listesi */
        .event-date { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-left: 5px solid #e94560; padding: 10px 15px; margin: 25px 0 12px 0; border-radius: 0 6px 6px 0; font-weight: bold; font-size: 16px; color: #fff; }
        .topcategory-section { margin: 15px 0; padding: 15px; background: #1e293b; border-radius: 8px; border: 1px solid #334155; }
        .topcategory-section h2 { margin: 0 0 15px 0; padding: 10px; background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); color: white; border-radius: 5px; font-size: 16px; }
        
        /* Maç Kartları */
        .event { background: #0f172a; margin-bottom: 10px; border-radius: 8px; border: 1px solid #334155; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .event:hover { border-color: #e94560; }
        .event-content { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .event-time { color: #f43f5e; font-weight: bold; font-size: 14px; margin-right: 15px; min-width: 70px; }
        .event-description { flex: 1; font-weight: 500; font-size: 15px; }
        
        /* Linklerin Orijinal Görünümü */
        .channel-list { background: #1e293b; padding: 12px; border-top: 1px solid #334155; display: none; gap: 8px; flex-wrap: wrap; }
        .channel-list.show { display: flex; }
        .channel-item { display: inline-block; background: #2563eb; color: white; padding: 10px 18px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 13px; transition: 0.2s; border: 1px solid #1d4ed8; }
        .channel-item:hover { background: #1d4ed8; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="container">
    <h1>MOST29 CANLI SPOR PANELDİ</h1>

    <!-- Tam Ekran Yapma Butonları İçeren Oyuncu Görünümü Aynen Korundu -->
    <div id="player-container">
        <button class="close-player" onclick="closePlayer()"><i class="fa-solid fa-xmark"></i> Kapat</button>
        <div style="clear: both;"></div>
        <!-- Sandbox ayarları sadece video oynatmaya izin verecek, popup açamayacak şekilde kilitlendi -->
        <iframe id="live-player" src="" allow="autoplay; fullscreen" allowfullscreen sandbox="allow-scripts allow-same-origin"></iframe>
    </div>

    <!-- Arama Çubuğu -->
    <div class="search-bar">
        <input type="text" id="search" placeholder="Etkinlik, kanal veya kategori ara..." onkeyup="searchEventOrChannel()">
    </div>
    
    <!-- Kategori Filtre Butonları -->
    <div id="topcategory-filter" class="topcategory-filter"></div>
    
    <!-- Program Akış Alanı -->
    <div id="schedule-container">
        <p style="text-align: center; padding: 20px; color: #94a3b8;"><i class="fa-solid fa-spinner fa-spin"></i> Yayın listesi CORS engeli aşılarak güvenle yükleniyor...</p>
    </div>
</div>

<script>
    // CORS hatasını tamamen bypass eden güvenli AllOrigins Proxy adresleri
    const targetUrl = 'https://daddylive.li/cache/tv/tv.json';
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
    
    let allData = {};
    let selectedTopCategory = 'All';

    async function fetchAndRenderSchedule() {
        try {
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error('Proxy yanıt vermedi.');
            
            const wrapper = await response.json();
            allData = JSON.parse(wrapper.contents); // Gelen şifreli ham metni JSON nesnesine çeviriyoruz
            
            const topcategories = extractTopCategories(allData);
            renderTopCategoryFilter(topcategories);
            renderSchedule(allData, 'All');
        } catch (error) {
            console.error('Veri yükleme hatası:', error);
            document.getElementById('schedule-container').innerHTML = '<p style="color: #f43f5e; text-align: center; padding: 20px;"><i class="fa-solid fa-circle-exclamation"></i> Yayın listesi şu anda güncellenemiyor. Lütfen sayfayı yenileyin.</p>';
        }
    }

    function extractTopCategories(data) {
        const topCategoriesSet = new Set();
        if (data && Object.keys(data).length > 0) {
            for (const [date, topcategories] of Object.entries(data)) {
                for (const topcategory of Object.keys(topcategories)) {
                    topCategoriesSet.add(topcategory);
                }
            }
        }
        return Array.from(topCategoriesSet).sort();
    }

    function renderTopCategoryFilter(topcategories) {
        const filterContainer = document.getElementById('topcategory-filter');
        filterContainer.innerHTML = '';
        
        const fixedPriority = ['All', 'Live Events', 'Popular Events'];
        const detectedCategories = topcategories.filter(cat => !fixedPriority.includes(cat));
        const finalOrder = [...fixedPriority, ...detectedCategories];
        
        finalOrder.forEach(topcategory => {
            const btn = document.createElement('button');
            btn.classList.add('topcategory-btn');
            if (topcategory === 'All') btn.classList.add('active');
            btn.textContent = topcategory;
            btn.onclick = () => filterByTopCategory(topcategory);
            filterContainer.appendChild(btn);
        });
    }

    function filterByTopCategory(topcategory) {
        selectedTopCategory = topcategory;
        document.querySelectorAll('.topcategory-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.textContent === topcategory) btn.classList.add('active');
        });
        renderSchedule(allData, topcategory);
    }

    function createEventElement(event) {
        const eventElement = document.createElement('div');
        eventElement.classList.add('event');
        
        let eventSearchData = event.event.toLowerCase();

        const channelsHTML = Array.isArray(event.channels) ? event.channels.map(channel => {
            eventSearchData += ` ${channel.channel_name.toLowerCase()}`;
            // Sayfa dışı yönlendirmeyi önleyip, kendi iç player'ımıza yönlendiriyoruz
            return `
                <a href="#" onclick="playStream(event, '${channel.channel_id}')" class="channel-item">
                    <i class="fa-solid fa-play font-size:10px;"></i> ${channel.channel_name}
                </a>
            `;
        }).join('') : '';

        eventElement.setAttribute('data-search-content', eventSearchData.trim());

        eventElement.innerHTML = `
            <div class="event-content" onclick="toggleChannels(this)">
                <div class="event-time"><i class="fa-regular fa-clock"></i> ${event.time}</div>
                <div class="event-description">${event.event}</div>
            </div>
            <div class="channel-list">
                ${channelsHTML}
            </div>
        `;
        return eventElement;
    }

    function toggleChannels(element) {
        const list = element.nextElementSibling;
        list.classList.toggle('show');
    }

    // Reklamları Engelleyen ve Doğrudan Sayfa İçi Oynatan Fonksiyon
    function playStream(e, id) {
        e.preventDefault();
        const playerContainer = document.getElementById('player-container');
        const iframe = document.getElementById('live-player');
        
        // daddylive altyapısının ham oynatıcı şablonunu çağırıyoruz
        iframe.src = `https://daddylive.li/embed/embed.php?id=${id}&player=1`;
        playerContainer.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function closePlayer() {
        const playerContainer = document.getElementById('player-container');
        const iframe = document.getElementById('live-player');
        iframe.src = '';
        playerContainer.style.display = 'none';
    }

    function renderSchedule(data, filterTopCategory) {
        const scheduleContainer = document.getElementById('schedule-container');
        scheduleContainer.innerHTML = '';

        const sortedDates = data ? Object.keys(data).sort() : [];

        sortedDates.forEach(date => {
            let categoryHasEvents = false;
            const dateContainer = document.createElement('div');
            
            for (const [topcategory, events] of Object.entries(data[date])) {
                if (filterTopCategory !== 'All' && filterTopCategory !== topcategory) continue;
                
                const topCategoryElement = document.createElement('div');
                topCategoryElement.classList.add('topcategory-section');
                topCategoryElement.setAttribute('data-topcategory', topcategory);
                
                const topCategoryTitle = document.createElement('h2');
                topCategoryTitle.innerHTML = `<i class="fa-solid fa-trophy"></i> ${topcategory}`;
                topCategoryElement.appendChild(topCategoryTitle);
                
                events.forEach(event => {
                    topCategoryElement.appendChild(createEventElement(event));
                    categoryHasEvents = true;
                });
                
                if (events.length > 0) {
                    dateContainer.appendChild(topCategoryElement);
                }
            }
            
            if (categoryHasEvents) {
                const dateHeader = document.createElement('div');
                dateHeader.classList.add('event-date');
                dateHeader.innerHTML = `<i class="fa-regular fa-calendar-days"></i> ${date}`;
                scheduleContainer.appendChild(dateHeader);
                scheduleContainer.appendChild(dateContainer);
            }
        });

        if (scheduleContainer.children.length === 0) {
            scheduleContainer.innerHTML = '<p style="text-align: center; padding: 20px; color:#94a3b8;">Bu kategoriye ait aktif yayın bulunamadı.</p>';
        }
    }

    function searchEventOrChannel() {
        const searchValue = document.getElementById('search').value.toLowerCase().trim();
        const events = document.querySelectorAll('.event');
        const categories = document.querySelectorAll('.topcategory-section');
        const dateHeaders = document.querySelectorAll('.event-date');

        if (searchValue === '') {
            events.forEach(event => event.style.display = 'block');
            categories.forEach(cat => cat.style.display = 'block');
            dateHeaders.forEach(header => header.style.display = 'block');
            return;
        }

        categories.forEach(cat => {
            let hasVisibleEvent = false;
            const catEvents = cat.querySelectorAll('.event');
            
            catEvents.forEach(event => {
                const searchContent = event.getAttribute('data-search-content') || '';
                if (searchContent.includes(searchValue)) {
                    event.style.display = 'block';
                    hasVisibleEvent = true;
                } else {
                    event.style.display = 'none';
                }
            });
            
            cat.style.display = hasVisibleEvent ? 'block' : 'none';
        });

        // Tarih başlıklarını eşitle
        dateHeaders.forEach(header => {
            let nextEl = header.nextElementSibling;
            let showHeader = false;
            if (nextEl && nextEl.querySelectorAll('.event[style="display: block;"]').length > 0) {
                showHeader = true;
            }
            header.style.display = showHeader ? 'block' : 'none';
        });
    }

    // Paneli Başlat
    fetchAndRenderSchedule();
</script>

</body>
</html>
